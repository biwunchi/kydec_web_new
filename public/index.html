<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-2: #fafafa;
    --bg-3: #f5f5f7;
    --surface: #ffffff;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #0a0a0a;

    --kt-red: #ff2d55;        /* KT 레드 */
    --kt-coral: #ff6b6b;
    --grad: linear-gradient(135deg, #00a86b 0%, #0891b2 100%);
    --grad-kt: linear-gradient(135deg, #ff2d55 0%, #f59e0b 100%);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: #fff; }
  
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  section { padding: 100px 0; position: relative; }
  footer { background: var(--bg); border-top: 1px solid var(--border); padding: 40px 32px; text-align: center; color: var(--text-dim); font-size: 13px; }
</style>
